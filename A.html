<!DOCTYPE html>
<html>
<head>
    <title>Jenga 3D - Fixed</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: #fff;
            background-color: rgba(0,0,0,0.5);
            padding: 5px;
            pointer-events: none; /* So it doesn't interfere with mouse events */
        }
    </style>
</head>
<body>
    <div id="info">
        Jenga 3D<br/>
        <b>Left-click + drag:</b> Orbit Camera | <b>Left-click on block + drag:</b> Move Block<br/>
        <b>Right-click + drag:</b> Pan Camera | <b>Mouse Wheel:</b> Zoom | <b>Press 'R' while dragging:</b> Rotate Block
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script>
        // --- Basic Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // --- Controls ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.target.set(0, 5, 0); // Look at the center of the tower

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(15, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // --- Physics World ---
        const world = new CANNON.World();
        world.gravity.set(0, -30, 0);
        world.broadphase = new CANNON.NaiveBroadphase();
        world.solver.iterations = 10;
        
        const physicsMaterials = {
            wood: new CANNON.Material('wood'),
            ground: new CANNON.Material('ground')
        };
        world.addContactMaterial(new CANNON.ContactMaterial(
            physicsMaterials.ground, physicsMaterials.wood, { friction: 0.3, restitution: 0.2 }
        ));
        world.addContactMaterial(new CANNON.ContactMaterial(
            physicsMaterials.wood, physicsMaterials.wood, { friction: 0.2, restitution: 0.01 }
        ));

        // --- Game Objects ---
        const objectsToUpdate = [];

        // Floor
        const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: physicsMaterials.ground });
        floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(floorBody);
        const floorMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x808080 })
        );
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        // Jenga Tower
        const blockHeight = 0.75, blockWidth = 1, blockDepth = 3;
        const numLayers = 16;
        const blockGeo = new THREE.BoxGeometry(blockWidth, blockHeight, blockDepth);
        const blockMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C, roughness: 0.8 });

        for (let i = 0; i < numLayers; i++) {
            for (let j = 0; j < 3; j++) {
                const isRotated = i % 2 === 0;
                
                const position = new CANNON.Vec3();
                if (isRotated) {
                    position.set(j * blockWidth - blockWidth, i * blockHeight + blockHeight / 2, 0);
                } else {
                    position.set(0, i * blockHeight + blockHeight / 2, j * blockWidth - blockWidth);
                }

                const blockBody = new CANNON.Body({ mass: 1, position, material: physicsMaterials.wood });
                 if(isRotated) blockBody.quaternion.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), Math.PI / 2);

                blockBody.linearDamping = 0.2;
                blockBody.angularDamping = 0.2;
                const shape = new CANNON.Box(new CANNON.Vec3(blockWidth / 2, blockHeight / 2, blockDepth / 2));
                blockBody.addShape(shape);
                world.addBody(blockBody);

                const blockMesh = new THREE.Mesh(blockGeo, blockMat);
                blockMesh.castShadow = true;
                blockMesh.receiveShadow = true;
                scene.add(blockMesh);
                
                objectsToUpdate.push({ mesh: blockMesh, body: blockBody });
            }
        }

        // --- Mouse & Keyboard Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedObject = null;
        const plane = new THREE.Plane();
        const grabOffset = new THREE.Vector3();

        window.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // Only left click

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objectsToUpdate.map(o => o.mesh));

            if (intersects.length > 0) {
                controls.enabled = false; // Disable camera controls
                selectedObject = objectsToUpdate.find(o => o.mesh === intersects[0].object);
                
                if (selectedObject) {
                    selectedObject.body.type = CANNON.Body.KINEMATIC;
                    const intersectionPoint = intersects[0].point;
                    plane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(plane.normal), intersectionPoint);
                    grabOffset.copy(intersectionPoint).sub(selectedObject.body.position);
                }
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            if (selectedObject) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(plane, intersection);
                
                selectedObject.body.position.copy(intersection.sub(grabOffset));
            }
        });

        window.addEventListener('mouseup', () => {
            controls.enabled = true; // Re-enable camera controls
            if (selectedObject) {
                selectedObject.body.type = CANNON.Body.DYNAMIC;
                selectedObject.body.wakeUp();
                selectedObject = null;
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' && selectedObject) {
                const body = selectedObject.body;
                const rotation = new CANNON.Quaternion();
                rotation.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), Math.PI / 2);
                body.quaternion = body.quaternion.mult(rotation);
            }
        });
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();

            world.step(1 / 60, deltaTime, 3);
            controls.update();

            for (const obj of objectsToUpdate) {
                obj.mesh.position.copy(obj.body.position);
                obj.mesh.quaternion.copy(obj.body.quaternion);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
