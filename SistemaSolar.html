<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Estelar Star Wars - Three.js</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:'Exo 2',sans-serif;overflow:hidden}
        canvas{display:block}
        #crawl-overlay{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.5s}
        #crawl-overlay.fade{opacity:0;pointer-events:none}
        #crawl-overlay h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.5em,5vw,3.5em);color:#FFE81F;text-align:center;letter-spacing:6px;text-shadow:0 0 30px rgba(255,232,31,0.4);animation:pulseIn 2s ease-out}
        #crawl-overlay p{color:#4488cc;font-size:0.9em;margin-top:20px;opacity:0.7}
        #skip-btn{margin-top:30px;background:transparent;border:1px solid #FFE81F;color:#FFE81F;padding:10px 30px;font-family:'Orbitron';font-size:0.8em;cursor:pointer;letter-spacing:2px;transition:all 0.3s}
        #skip-btn:hover{background:rgba(255,232,31,0.15)}
        @keyframes pulseIn{0%{opacity:0;transform:scale(1.5)}100%{opacity:1;transform:scale(1)}}
        #info-panel{position:absolute;top:20px;right:20px;background:rgba(5,8,20,0.92);backdrop-filter:blur(12px);padding:22px;border:1px solid rgba(255,232,31,0.2);border-radius:4px;width:285px;pointer-events:none;transition:opacity 0.4s,transform 0.4s;opacity:0;transform:translateX(20px);box-shadow:0 0 30px rgba(0,0,0,0.6)}
        #info-panel.visible{opacity:1;transform:translateX(0)}
        #info-panel h2{margin:0 0 4px;font-family:'Orbitron';font-size:1.15em;color:#FFE81F;letter-spacing:2px}
        #info-panel .subtitle{color:#4488cc;font-size:0.75em;margin-bottom:12px;font-style:italic}
        #info-panel .stat{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,232,31,0.06);font-size:0.82em}
        #info-panel .stat span:first-child{color:#6688aa}
        #info-panel .stat span:last-child{color:#c0c8d0}
        #info-panel .quote{margin-top:12px;padding:10px;background:rgba(255,232,31,0.04);border-left:2px solid rgba(255,232,31,0.3);font-size:0.78em;color:#8899aa;font-style:italic}
        #controls{position:absolute;bottom:20px;left:20px;background:rgba(5,8,20,0.9);backdrop-filter:blur(12px);padding:18px 22px;border-radius:4px;border:1px solid rgba(255,232,31,0.15);box-shadow:0 0 20px rgba(0,0,0,0.5);min-width:250px}
        #controls h3{margin:0 0 14px;font-family:'Orbitron';font-size:0.72em;color:#FFE81F;letter-spacing:3px;text-transform:uppercase}
        .ctrl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .ctrl-row label{font-size:0.82em;color:#6688aa}
        .ctrl-row .val{font-size:0.78em;color:#FFE81F;min-width:35px;text-align:right}
        input[type="range"]{-webkit-appearance:none;width:120px;height:4px;background:#1a1e2e;border-radius:2px;outline:none}
        input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#FFE81F;cursor:pointer;border:2px solid #000;box-shadow:0 0 8px rgba(255,232,31,0.5)}
        .btn{cursor:pointer;background:rgba(255,232,31,0.06);color:#8899aa;border:1px solid rgba(255,232,31,0.15);padding:7px 12px;border-radius:3px;font-size:0.78em;transition:all 0.25s;width:100%;font-family:'Exo 2'}
        .btn:hover{background:rgba(255,232,31,0.12);color:#FFE81F;border-color:rgba(255,232,31,0.4)}
        .btn.active{background:rgba(255,232,31,0.1);border-color:rgba(255,232,31,0.4);color:#FFE81F}
        #title-bar{position:absolute;top:20px;left:20px;pointer-events:none}
        #title-bar h1{font-family:'Orbitron';font-size:1em;color:#FFE81F;letter-spacing:3px;margin:0}
        #title-bar span{font-size:0.65em;display:block;color:rgba(100,140,200,0.6);margin-top:4px;letter-spacing:1px}
        #tooltip{position:absolute;pointer-events:none;background:rgba(5,8,20,0.95);padding:6px 14px;border-radius:3px;font-size:0.78em;color:#FFE81F;border:1px solid rgba(255,232,31,0.25);opacity:0;transition:opacity 0.2s;font-family:'Orbitron';letter-spacing:1px}
        .faction-badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:0.7em;letter-spacing:1px;margin-bottom:8px}
        .faction-republic{background:rgba(40,100,200,0.2);color:#4488cc;border:1px solid rgba(40,100,200,0.3)}
        .faction-empire{background:rgba(200,50,50,0.15);color:#cc4444;border:1px solid rgba(200,50,50,0.25)}
        .faction-hutt{background:rgba(100,150,50,0.15);color:#88aa44;border:1px solid rgba(100,150,50,0.25)}
        .faction-neutral{background:rgba(150,150,150,0.1);color:#888;border:1px solid rgba(150,150,150,0.2)}
    </style>
</head>
<body>
<div id="crawl-overlay"><h1>STAR WARS</h1><p>Sistema Estelar Interactivo</p><button id="skip-btn" aria-label="Explorar galaxia">EXPLORAR GALAXIA</button></div>
<div id="title-bar"><h1>SISTEMA ESTELAR</h1><span>Clic en un planeta para info - Arrastra para explorar</span></div>
<div id="info-panel"><h2 id="p-name"></h2><div id="p-subtitle" class="subtitle"></div><div id="p-faction"></div><div id="p-stats"></div><div id="p-quote" class="quote" style="display:none"></div></div>
<div id="tooltip"></div>
<div id="controls">
    <h3>Centro de Mando</h3>
    <div class="ctrl-row"><label>Velocidad:</label><input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1"><span class="val" id="speed-val">1.0x</span></div>
    <div class="ctrl-row" style="gap:8px"><button class="btn" id="btn-pause">Pausar</button><button class="btn active" id="btn-orbits">Rutas</button></div>
    <div class="ctrl-row" style="gap:8px"><button class="btn" id="btn-labels">Hologramas</button><button class="btn" id="btn-reset">Reset Nav</button></div>
</div>
<script type="importmap">{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

class OrbitControls{
constructor(cam,el){this.camera=cam;this.domElement=el;this.target=new THREE.Vector3();this.dampingFactor=0.07;this.rotateSpeed=0.5;this.zoomSpeed=1.2;this.minDistance=30;this.maxDistance=1800;this._sph=new THREE.Spherical();this._sphD=new THREE.Spherical();this._scale=1;this._down=false;this._ps=new THREE.Vector2();this._pe=new THREE.Vector2();this._sph.setFromVector3(cam.position.clone().sub(this.target));el.addEventListener('pointerdown',e=>{this._down=true;this._ps.set(e.clientX,e.clientY)});el.addEventListener('pointermove',e=>{if(!this._down)return;this._pe.set(e.clientX,e.clientY);this._sphD.theta-=(this._pe.x-this._ps.x)*this.rotateSpeed*2*Math.PI/el.clientHeight;this._sphD.phi-=(this._pe.y-this._ps.y)*this.rotateSpeed*2*Math.PI/el.clientHeight;this._ps.copy(this._pe)});el.addEventListener('pointerup',()=>this._down=false);el.addEventListener('wheel',e=>{e.preventDefault();this._scale=Math.pow(0.95,this.zoomSpeed*Math.sign(e.deltaY))},{passive:false});el.addEventListener('contextmenu',e=>e.preventDefault())}
update(){const off=this.camera.position.clone().sub(this.target);this._sph.setFromVector3(off);this._sph.theta+=this._sphD.theta*this.dampingFactor;this._sph.phi+=this._sphD.phi*this.dampingFactor;this._sph.phi=Math.max(0.05,Math.min(Math.PI-0.05,this._sph.phi));this._sph.radius*=this._scale;this._scale=1;this._sph.radius=Math.max(this.minDistance,Math.min(this.maxDistance,this._sph.radius));off.setFromSpherical(this._sph);this.camera.position.copy(this.target).add(off);this.camera.lookAt(this.target);this._sphD.theta*=(1-this.dampingFactor);this._sphD.phi*=(1-this.dampingFactor)}
}

document.getElementById('skip-btn').addEventListener('click',()=>{document.getElementById('crawl-overlay').classList.add('fade');setTimeout(()=>document.getElementById('crawl-overlay').style.display='none',1600)});

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,5000);
camera.position.set(0,200,450);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);
const ctrl=new OrbitControls(camera,renderer.domElement);
const clock=new THREE.Clock();
let globalSpeed=1,isPaused=false,showOrbits=true,showLabels=false;

function makeTex(w,h,fn){const c=document.createElement('canvas');c.width=w;c.height=h;fn(c.getContext('2d'),w,h);const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t}

// STARFIELD
scene.add(new THREE.Mesh(new THREE.SphereGeometry(2200,64,32),new THREE.MeshBasicMaterial({map:makeTex(2048,1024,(ctx,w,h)=>{
ctx.fillStyle='#010208';ctx.fillRect(0,0,w,h);
const nc=['rgba(60,20,100,0.06)','rgba(20,50,100,0.05)','rgba(100,20,50,0.04)','rgba(20,80,80,0.03)'];
for(let i=0;i<16;i++){const g=ctx.createRadialGradient(Math.random()*w,Math.random()*h,0,Math.random()*w,Math.random()*h,Math.random()*350+80);g.addColorStop(0,nc[i%nc.length]);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,w,h)}
for(let i=0;i<8000;i++){const b=Math.floor(Math.random()*155+100),r=Math.random()*1.3+0.2,t=Math.random();ctx.fillStyle=t<0.06?'rgb('+b+','+(b*0.7|0)+','+(b*0.5|0)+')':t<0.12?'rgb('+(b*0.6|0)+','+(b*0.7|0)+','+b+')':'rgb('+b+','+b+','+b+')';ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,r,0,Math.PI*2);ctx.fill()}
}),side:THREE.BackSide})));

// CENTRAL STAR
const sunMesh=new THREE.Mesh(new THREE.SphereGeometry(20,48,48),new THREE.MeshBasicMaterial({map:makeTex(512,256,(ctx,w,h)=>{
const g=ctx.createLinearGradient(0,0,w,h);g.addColorStop(0,'#ffffcc');g.addColorStop(0.3,'#ffdd66');g.addColorStop(0.6,'#ffaa22');g.addColorStop(1,'#ffcc44');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
for(let i=0;i<500;i++){ctx.fillStyle='rgba(255,'+(Math.random()*100+150|0)+','+(Math.random()*60|0)+','+(Math.random()*0.3)+')';ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*14+2,0,Math.PI*2);ctx.fill()}
}),color:0xffee66}));
scene.add(sunMesh);

const glowSprites=[];
[80,130].forEach((s,i)=>{const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:makeTex(256,256,(ctx,w,h)=>{const g=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);g.addColorStop(0,i===0?'rgba(255,230,80,0.5)':'rgba(255,200,50,0.1)');g.addColorStop(0.5,i===0?'rgba(255,180,30,0.1)':'rgba(255,150,20,0.02)');g.addColorStop(1,'rgba(255,100,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h)}),transparent:true,depthWrite:false}));sp.scale.set(s,s,1);sp.userData.bs=s;scene.add(sp);glowSprites.push(sp)});

scene.add(new THREE.PointLight(0xfff8e0,2.8,2500,1.1));
scene.add(new THREE.AmbientLight(0x0a0a18,0.5));

// PLANETS
const PD=[
{name:'Coruscant',r:4.5,d:42,tilt:0.1,os:3.2,rs:2.5,fac:'republic',sub:'Capital de la Republica Galactica',

for(let i=0;i<25;i++){ctx.fillStyle='rgba('+(120+Math.random()*30|0)+','+(90+Math.random()*20|0)+','+(50+Math.random()*20|0)+',0.25)';ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*15+3,0,Math.PI*2);ctx.fill()}

function mkXWing(){
    const g=new THREE.Group();
    const body=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.3,2.5,6),new THREE.MeshStandardMaterial({color:0xcccccc,roughness:0.4,metalness:0.6}));
    body.rotation.x=Math.PI/2;g.add(body);
    const nose=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.8,6),new THREE.MeshStandardMaterial({color:0xdddddd,roughness:0.3,metalness:0.5}));
    nose.rotation.x=-Math.PI/2;nose.position.z=-1.6;g.add(nose);
    const wg=new THREE.BoxGeometry(3.2,0.04,0.7);const wm=new THREE.MeshStandardMaterial({color:0xbbbbbb,roughness:0.5,metalness:0.4});
    [0.15,-0.15].forEach(yo=>{const w=new THREE.Mesh(wg,wm);w.position.y=yo;w.position.z=0.2;w.rotation.z=yo>0?0.1:-0.1;g.add(w)});
    const em=new THREE.MeshBasicMaterial({color:0xff4444});
    [[-1.3,0.15,1.1],[1.3,0.15,1.1],[-1.3,-0.15,1.1],[1.3,-0.15,1.1]].forEach(([x,y,z])=>{const e=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),em);e.position.set(x,y,z);g.add(e)});
    const cp=new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8),new THREE.MeshStandardMaterial({color:0x88aaff,roughness:0.1,metalness:0.8,transparent:true,opacity:0.6}));
    cp.position.set(0,0.18,-0.6);cp.scale.set(0.8,0.6,1);g.add(cp);
    const st=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.06,2),new THREE.MeshBasicMaterial({color:0xcc3333}));st.position.set(0,0.32,0);g.add(st);
    return g;
}

}
function mkSD(){
    const g=new THREE.Group();
    const shape=new THREE.Shape();shape.moveTo(0,-5);shape.lineTo(-2.5,5);shape.lineTo(2.5,5);shape.closePath();
    const hull=new THREE.Mesh(new THREE.ExtrudeGeometry(shape,{depth:0.8,bevelEnabled:true,bevelThickness:0.2,bevelSize:0.1,bevelSegments:2}),new THREE.MeshStandardMaterial({color:0x889099,roughness:0.4,metalness:0.7}));hull.rotation.x=Math.PI/2;hull.scale.set(1.2,1.2,1.2);g.add(hull);
    const tw=new THREE.Mesh(new THREE.BoxGeometry(1.2,1,0.6),new THREE.MeshStandardMaterial({color:0x778088,roughness:0.3,metalness:0.6}));tw.position.set(0,0.8,3);g.add(tw);
    const br=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.3),new THREE.MeshBasicMaterial({color:0x4466aa,transparent:true,opacity:0.6}));br.position.set(0,1.35,3);g.add(br);
    for(let i=-1;i<=1;i++){const e=new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8),new THREE.MeshBasicMaterial({color:0x4488ff}));e.position.set(i*0.8,0,5.5);g.add(e)}
    for(let i=0;i<6;i++){const l=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,8),new THREE.MeshStandardMaterial({color:0x667077}));l.position.set(-1.5+i*0.6,0.52,1);g.add(l)}
    return g;
}
function mkFalcon(){

    [-1,1].forEach(s=>{const p=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.3,1.8),new THREE.MeshStandardMaterial({color:0x887766,roughness:0.5,metalness:0.4}));p.position.set(s*0.6,0,-2.2);g.add(p)});
    const cp=new THREE.Mesh(new THREE.SphereGeometry(0.35,8,8),new THREE.MeshStandardMaterial({color:0x6688bb,roughness:0.1,metalness:0.8,transparent:true,opacity:0.5}));cp.position.set(1.5,0.2,-1);cp.scale.set(1,0.6,1);g.add(cp);
    const dish=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.4,0.2,12),new THREE.MeshStandardMaterial({color:0xaaaaaa}));dish.position.set(0.5,0.45,0.3);g.add(dish);
    for(let i=-2;i<=2;i++){const e=new THREE.Mesh(new THREE.SphereGeometry(0.12,6,6),new THREE.MeshBasicMaterial({color:0x44aaff}));e.position.set(i*0.35,0,1.9);g.add(e)}

}

const ships=[];
function spawn(type,oR,spd,yO,sc){
    let m;if(type==='xw')m=mkXWing();else if(type==='tie')m=mkTIE();else if(type==='sd')m=mkSD();else m=mkFalcon();
    m.scale.setScalar(sc);
    const pv=new THREE.Group();pv.rotation.y=Math.random()*Math.PI*2;scene.add(pv);
    m.position.set(oR,yO,0);pv.add(m);
    const tc=40,tp=new Float32Array(tc*3);const tg=new THREE.BufferGeometry();tg.setAttribute('position',new THREE.BufferAttribute(tp,3));
    const col=type==='tie'?0x4466aa:type==='sd'?0x4488ff:type==='mf'?0x44aaff:0xff4444;
    const tl=new THREE.Line(tg,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.35}));scene.add(tl);
    ships.push({mesh:m,pivot:pv,speed:spd,type,trail:tl,tp,iy:yO});
}

// LABELS
const lc=document.createElement('div');lc.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden';document.body.appendChild(lc);
planets.forEach(p=>{const d=document.createElement('div');d.textContent=p.def.name;d.style.cssText='position:absolute;color:#FFE81F;font-family:Orbitron,sans-serif;font-size:10px;pointer-events:none;transition:opacity 0.3s;opacity:0;text-shadow:0 0 6px rgba(0,0,0,0.9);letter-spacing:1px';lc.appendChild(d);p.lbl=d});

function updateLabels(){planets.forEach(p=>{const wp=new THREE.Vector3();p.mesh.getWorldPosition(wp);wp.y+=p.def.r+4;const s=wp.clone().project(camera);p.lbl.style.left=((s.x*0.5+0.5)*window.innerWidth)+'px';p.lbl.style.top=((-s.y*0.5+0.5)*window.innerHeight)+'px';p.lbl.style.transform='translate(-50%,-100%)';p.lbl.style.opacity=(showLabels&&s.z<1)?'1':'0'})}

// RAYCASTER
const rc=new THREE.Raycaster();const mo=new THREE.Vector2();const tt=document.getElementById('tooltip');
renderer.domElement.addEventListener('click',e=>{mo.x=(e.clientX/window.innerWidth)*2-1;mo.y=-(e.clientY/window.innerHeight)*2+1;rc.setFromCamera(mo,camera);const h=rc.intersectObjects(rayTargets);if(h.length){const p=planets.find(pl=>pl.mesh===h[0].object);if(p)showInfo(p)}else hideInfo()});
renderer.domElement.addEventListener('mousemove',e=>{mo.x=(e.clientX/window.innerWidth)*2-1;mo.y=-(e.clientY/window.innerHeight)*2+1;rc.setFromCamera(mo,camera);const h=rc.intersectObjects(rayTargets);if(h.length){const p=planets.find(pl=>pl.mesh===h[0].object);if(p){tt.textContent=p.def.name;tt.style.opacity='1';tt.style.left=(e.clientX+15)+'px';tt.style.top=(e.clientY-10)+'px'}renderer.domElement.style.cursor='pointer'}else{tt.style.opacity='0';renderer.domElement.style.cursor='grab'}});

function showInfo(p){const pn=document.getElementById('info-panel');document.getElementById('p-name').textContent=p.def.name;document.getElementById('p-subtitle').textContent=p.def.sub;const fm={republic:'REPUBLICA',empire:'IMPERIO',hutt:'ESPACIO HUTT',neutral:'NEUTRAL'};document.getElementById('p-faction').innerHTML='<span class="faction-badge faction-'+p.def.fac+'">'+fm[p.def.fac]+'</span>';const st=document.getElementById('p-stats');st.innerHTML='';Object.entries(p.def.info).forEach(([k,v])=>{st.innerHTML+='<div class="stat"><span>'+k.charAt(0).toUpperCase()+k.slice(1)+'</span><span>'+v+'</span></div>'});const q=document.getElementById('p-quote');if(p.def.q){q.textContent=p.def.q;q.style.display='block'}else q.style.display='none';pn.classList.add('visible')}
function hideInfo(){document.getElementById('info-panel').classList.remove('visible')}

// CONTROLS
const ss=document.getElementById('speed-slider'),sv=document.getElementById('speed-val');
ss.addEventListener('input',()=>{globalSpeed=parseFloat(ss.value);sv.textContent=globalSpeed.toFixed(1)+'x'});
document.getElementById('btn-pause').addEventListener('click',function(){isPaused=!isPaused;this.textContent=isPaused?'Reanudar':'Pausar';this.classList.toggle('active',isPaused)});
document.getElementById('btn-orbits').addEventListener('click',function(){showOrbits=!showOrbits;orbitLines.forEach(l=>l.visible=showOrbits);this.classList.toggle('active',showOrbits)});
document.getElementById('btn-labels').addEventListener('click',function(){showLabels=!showLabels;this.classList.toggle('active',showLabels)});
document.getElementById('btn-reset').addEventListener('click',()=>{camera.position.set(0,200,450);ctrl.target.set(0,0,0)});

// ANIMATION
function animate(){
    requestAnimationFrame(animate);
    const delta=clock.getDelta();
    const elapsed=clock.getElapsedTime();
    if(!isPaused){
        const dt=delta*globalSpeed;
        sunMesh.rotation.y+=dt*0.08;
        planets.forEach(p=>{
            p.og.rotation.y+=dt*p.def.os*0.25;
            p.mesh.rotation.y+=dt*p.def.rs*1.5;
        });
        planets[4].mesh.material.emissiveIntensity=0.15+Math.sin(elapsed*3)*0.08;
        planets[0].mesh.material.emissiveIntensity=0.12+Math.sin(elapsed*1.5)*0.03;
        ships.forEach(s=>{
            s.pivot.rotation.y+=dt*s.speed*0.2;
            const wp=new THREE.Vector3();
            if(s.type==='mf'){s.mesh.position.y=s.iy+Math.sin(elapsed*2.5)*3;s.mesh.rotation.z=Math.sin(elapsed*1.8)*0.15}
            if(s.type==='tie')s.mesh.rotation.z=Math.sin(elapsed*3+s.speed)*0.1;
            s.mesh.rotation.y=s.pivot.rotation.y*(s.speed>0?-1:1)+Math.PI/2;
            s.mesh.getWorldPosition(wp);
            const tp=s.tp;for(let i=tp.length-3;i>=3;i-=3){tp[i]=tp[i-3];tp[i+1]=tp[i-2];tp[i+2]=tp[i-1]}
            tp[0]=wp.x;tp[1]=wp.y;tp[2]=wp.z;
            s.trail.geometry.attributes.position.needsUpdate=true;
        });
        ds.rotation.y+=dt*0.05;
        const dsa=elapsed*0.02;ds.position.x=Math.cos(dsa)*350;ds.position.z=Math.sin(dsa)*350;
    }
    const pulse=1+Math.sin(elapsed*1.5)*0.04;
    glowSprites.forEach(sp=>sp.scale.setScalar(sp.userData.bs*pulse));
    updateLabels();ctrl.update();renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});
